{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="glass-card p-5">
                <h3 class="text-center mb-4"><i class="fa-solid fa-user-lock text-primary"></i> Admin Portal Login</h3>
                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Username</label>
                        <input type="text" name="username" class="form-control" required placeholder="Enter admin user">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Password</label>
                        <input type="password" name="password" class="form-control" required placeholder="Enter password">
                    </div>
                    <button type="submit" class="btn btn-custom w-100">Secure Login <i class="fa-solid fa-arrow-right-to-bracket"></i></button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
